<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r   = size * 0.22;

  // Background
  ctx.fillStyle = '#C8102E';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Draw checklist rows
  const rows = [
    { y: 0.28, checkOpacity: 1.0 },
    { y: 0.50, checkOpacity: 0.7 },
    { y: 0.72, checkOpacity: 0.5 },
  ];

  rows.forEach(row => {
    const yc  = size * row.y;
    const cx  = size * 0.18;
    const lx  = size * 0.38;
    const ly  = yc;
    const lw  = size * 0.44;
    const lh  = size * 0.07;
    const lrr = lh / 2;
    const cSize = size * 0.11;

    // Checkmark
    ctx.save();
    ctx.globalAlpha = row.checkOpacity;
    ctx.strokeStyle = 'rgba(255,255,255,0.92)';
    ctx.lineWidth   = size * 0.055;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - cSize * 0.5, yc);
    ctx.lineTo(cx,               yc + cSize * 0.5);
    ctx.lineTo(cx + cSize,       yc - cSize * 0.6);
    ctx.stroke();
    ctx.restore();

    // Bar
    ctx.save();
    ctx.globalAlpha = row.checkOpacity * 0.85;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.roundRect(lx, ly - lh/2, lw, lh, lrr);
    ctx.fill();
    ctx.restore();
  });

  return canvas.toDataURL('image/png');
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
const d192 = drawIcon(c192, 192);
const d512 = drawIcon(c512, 512);

// Download both
function dl(data, name) {
  const a = document.createElement('a');
  a.href = data; a.download = name; a.click();
}
dl(d192, 'icon-192.png');
setTimeout(() => dl(d512, 'icon-512.png'), 500);
</script>
</body>
</html>
